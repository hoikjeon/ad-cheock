name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9 */3 * *'  # 3일마다 오전 9시(UTC) 실행
  workflow_dispatch:        # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Supabase 핑
        run: |
          curl -s -o /dev/null -w "HTTP 상태: %{http_code}\n" \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/?apikey=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          echo "Supabase 핑 완료 - $(date)"
